name: Self-Hosted Release

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual release'
        required: false
        default: 'Manual trigger'

jobs:
  release:
    name: Build & Publish to GHCR
    runs-on: ubuntu-latest
    # 45 min gives headroom for cold-cache builds and GHCR contention.
    # Normal runs are ~15 min; v0.6.3 hit the 30 min cap on a slow run.
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API Image ---
      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/knowz-io/knowz-selfhosted-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Knowz.SelfHosted.API/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      # --- Web Image ---
      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/knowz-io/knowz-selfhosted-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: src/knowz-selfhosted-web
          file: src/knowz-selfhosted-web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      # --- MCP Image ---
      - name: Extract metadata for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/knowz-io/knowz-selfhosted-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Knowz.MCP/Dockerfile
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      # --- Summary ---
      - name: Release summary
        if: always()
        run: |
          echo "## Self-Hosted Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/knowz-io/knowz-selfhosted-api\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/knowz-io/knowz-selfhosted-web\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/knowz-io/knowz-selfhosted-mcp\`" >> $GITHUB_STEP_SUMMARY
