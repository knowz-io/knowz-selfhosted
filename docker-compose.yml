# Knowz Self-Hosted Docker Compose
# Usage: docker compose up --build
#
# Services:
#   db  - SQL Server 2022 Express (free)
#   api - Knowz Self-Hosted API (.NET 10)
#   web - Knowz Self-Hosted Web (React + nginx)
#   mcp - Knowz MCP Server (Model Context Protocol for AI tools)
#
# First run: API auto-migrates the database and seeds SuperAdmin from the
# ADMIN_USERNAME / ADMIN_PASSWORD values in your .env. No defaults ship.
# Access: http://localhost:3000 (web) | http://localhost:5000/swagger (API) | http://localhost:3001 (MCP)
#
# AI: Copy .env.example to .env. Easiest: uncomment KNOWZ_PLATFORM section + paste your API key.
# No .env = no AI (Mode 1). Get your API key at https://knowz.io → Settings → API Keys.

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Knowz_Dev_P@ssw0rd!}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - knowz-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD:-Knowz_Dev_P@ssw0rd!}" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/Knowz.SelfHosted.API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Required: Database connection
      ConnectionStrings__McpDb: "Server=db,1433;Database=KnowzSelfHosted;User Id=sa;Password=${SA_PASSWORD:-Knowz_Dev_P@ssw0rd!};TrustServerCertificate=True;Encrypt=True"
      Database__AutoMigrate: "true"

      # Required: Authentication — MUST be supplied via .env (no defaults).
      # Copy .env.example to .env and set JWT_SECRET (>=32 chars, cryptographically random),
      # ADMIN_USERNAME, and ADMIN_PASSWORD (>=12 chars mixed alpha-num-symbol, not on the
      # weak-password denylist in AuthService.WeakPasswordList). First boot will fail fast
      # if any are missing or weak — by design, per SEC_P0Triage.
      SelfHosted__JwtSecret: "${JWT_SECRET:?JWT_SECRET must be set in .env (>=32 chars)}"
      SelfHosted__SuperAdminUsername: "${ADMIN_USERNAME:?ADMIN_USERNAME must be set in .env}"
      SelfHosted__SuperAdminPassword: "${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}"

      # Security: CORS (restrict to web container's external URL)
      SelfHosted__AllowedOrigins__0: "http://localhost:3000"

      # Security: Rate limiting (enabled by default)
      SelfHosted__RateLimiting__Enabled: "true"

      # MCP service-to-service key (must match MCP container's MCP__ServiceKey)
      MCP__ServiceKey: "${MCP_SERVICE_KEY:-knowz-mcp-dev-service-key}"

      # Storage: Local filesystem with volume mount
      Storage__Provider: "LocalFileSystem"
      Storage__Local__RootPath: "/data/files"

      # AI Services — Mode 2: Direct Azure (configure in .env, see .env.example)
      AzureOpenAI__Endpoint: "${AZURE_OPENAI_ENDPOINT:-}"
      AzureOpenAI__ApiKey: "${AZURE_OPENAI_APIKEY:-}"
      AzureOpenAI__DeploymentName: "${AZURE_OPENAI_DEPLOYMENT:-gpt-5.2-chat}"
      AzureOpenAI__EmbeddingDeploymentName: "${AZURE_OPENAI_EMBEDDING:-text-embedding-3-small}"
      AzureAISearch__Endpoint: "${AZURE_SEARCH_ENDPOINT:-}"
      AzureAISearch__ApiKey: "${AZURE_SEARCH_APIKEY:-}"
      AzureAISearch__IndexName: "${AZURE_SEARCH_INDEX:-knowz-selfhosted}"

      # AI Services — Mode 3: Platform Proxy (configure in .env, see .env.example)
      KnowzPlatform__Enabled: "${KNOWZ_PLATFORM_ENABLED:-false}"
      KnowzPlatform__BaseUrl: "${KNOWZ_PLATFORM_URL:-}"
      KnowzPlatform__ApiKey: "${KNOWZ_PLATFORM_APIKEY:-}"
    volumes:
      - knowz-file-storage:/data/files
    healthcheck:
      test: curl -f http://localhost:8080/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: src/knowz-selfhosted-web
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      api:
        condition: service_started

  mcp:
    build:
      context: .
      dockerfile: src/Knowz.MCP/Dockerfile
    ports:
      - "${MCP_PORT:-3001}:8080"
    depends_on:
      api:
        condition: service_healthy
    environment:
      Knowz__BaseUrl: "${MCP_API_URL:-http://api:8080}"
      MCP__BackendMode: "${MCP_BACKEND_MODE:-selfhosted}"
      MCP__ApiKeyValidationEndpoint: "${MCP_API_KEY_VALIDATION_ENDPOINT:-/api/vaults}"
      MCP__ServiceKey: "${MCP_SERVICE_KEY:-knowz-mcp-dev-service-key}"
      Authentication__ValidateApiKey: "${MCP_VALIDATE_API_KEY:-true}"
    healthcheck:
      test: curl -f http://localhost:8080/.well-known/oauth-authorization-server || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  knowz-db-data:
  knowz-file-storage:
